version: '3.8'

services:
  # Base de Datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: barbergo-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: barbergo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Backend Node.js
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: barbergo-api
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:mysecretpassword@db:5432/barbergo?schema=public
      - JWT_SECRET=tu_jwt_secret_super_seguro
      - PORT=3001
      # Reemplaza estas variables en tu entorno de producción
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PLATFORM_FEE_PERCENT=10
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  postgres_data:
